<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>META 廣告數據儀表板｜丰丹 × 花現喜福</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f7f6f3; --surface: #ffffff; --surface2: #f0eeea;
    --border: rgba(0,0,0,0.1); --border2: rgba(0,0,0,0.18);
    --text: #1a1a1a; --text2: #555; --text3: #888;
    --blue: #1877f2; --green: #2e7d32; --red: #c62828; --amber: #e65100;
    --green-bg: #e8f5e9; --red-bg: #ffebee; --amber-bg: #fff3e0; --blue-bg: #e3f2fd;
    --radius: 10px; --radius-sm: 6px;
  }
  body { font-family: -apple-system,'Segoe UI',sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  .top-bar { background: #1877f2; padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; }
  .top-bar h1 { color: #fff; font-size: 17px; font-weight: 600; }
  .date-badge { background: rgba(255,255,255,0.2); color: #fff; font-size: 12px; padding: 4px 12px; border-radius: 20px; }
  .refresh-btn { background: rgba(255,255,255,0.2); color: #fff; border: none; padding: 6px 14px; border-radius: var(--radius-sm); cursor: pointer; font-size: 13px; }
  .refresh-btn:hover { background: rgba(255,255,255,0.3); }

  .container { max-width: 1200px; margin: 0 auto; padding: 20px; }

  .client-tabs { display: flex; gap: 8px; margin-bottom: 20px; }
  .client-tab { padding: 10px 20px; border: 0.5px solid var(--border2); border-radius: var(--radius); cursor: pointer; background: var(--surface); font-size: 14px; font-weight: 500; color: var(--text2); transition: all 0.15s; }
  .client-tab.active { background: #1877f2; color: #fff; border-color: #1877f2; }
  .client-tab:hover:not(.active) { background: var(--surface2); }

  .client-panel { display: none; }
  .client-panel.active { display: block; }

  .status-bar { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 12px 16px; margin-bottom: 16px; font-size: 13px; color: var(--text2); display: flex; align-items: center; gap: 8px; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #ccc; flex-shrink: 0; }
  .status-dot.loading { background: #ffa000; animation: pulse 1s infinite; }
  .status-dot.ok { background: #2e7d32; }
  .status-dot.error { background: #c62828; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  .error-msg { background: var(--red-bg); border: 0.5px solid #ef9a9a; border-radius: var(--radius); padding: 14px 16px; color: var(--red); font-size: 13px; margin-bottom: 16px; }

  .daily-report-box { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-bottom: 24px; }
  .daily-report-header { background: linear-gradient(135deg,#0d47a1 0%,#1877f2 100%); padding: 14px 18px; display: flex; align-items: center; justify-content: space-between; }
  .daily-report-header h2 { color: #fff; font-size: 15px; font-weight: 700; }
  .copy-btn { background: rgba(255,255,255,0.2); color: #fff; border: none; padding: 5px 14px; border-radius: 20px; font-size: 12px; cursor: pointer; transition: background 0.15s; }
  .copy-btn:hover { background: rgba(255,255,255,0.35); }
  .copy-btn.copied { background: rgba(46,125,50,0.6); }
  .daily-report-body { padding: 18px 20px; }
  .report-section { margin-bottom: 18px; padding-bottom: 18px; border-bottom: 0.5px solid var(--border); }
  .report-section:last-child { margin-bottom:0; padding-bottom:0; border-bottom:none; }
  .report-section-title { font-size: 11px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 10px; }
  .report-text { font-size: 14px; color: var(--text); line-height: 1.9; }
  .report-loading { padding: 24px; text-align: center; color: var(--text3); font-size: 13px; }
  .kpi-chips { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 4px; }
  .kpi-chip { background: var(--surface2); border-radius: 8px; padding: 8px 14px; min-width: 90px; }
  .kpi-chip-label { font-size: 11px; color: var(--text3); margin-bottom: 3px; }
  .kpi-chip-value { font-size: 16px; font-weight: 700; color: var(--text); }

  .ai-report-wrap { position: relative; }
  .ai-report-text { font-size: 14px; color: var(--text); line-height: 2; min-height: 60px; white-space: pre-wrap; word-break: break-word; }
  .ai-report-text .cursor { display: inline-block; width: 2px; height: 1em; background: #1877f2; margin-left: 2px; vertical-align: text-bottom; animation: blink 0.8s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
  .ai-generating-bar { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text3); margin-bottom: 10px; padding: 6px 10px; background: var(--blue-bg); border-radius: 6px; }
  .ai-spinner { width: 14px; height: 14px; border: 2px solid #bbdefb; border-top-color: #1877f2; border-radius: 50%; animation: spin 0.7s linear infinite; flex-shrink: 0; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .ai-regen-btn { font-size: 11px; color: #1877f2; border: 0.5px solid #bbdefb; background: var(--surface); padding: 3px 10px; border-radius: 20px; cursor: pointer; margin-left: auto; white-space: nowrap; }
  .ai-regen-btn:hover { background: var(--blue-bg); }
  .ai-error-msg { font-size: 13px; color: var(--red); padding: 8px 0; }

  .day-compare { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
  .day-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 16px; }
  .day-card h3 { font-size: 13px; font-weight: 500; color: var(--text3); margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
  .day-dot-today { width:8px;height:8px;border-radius:50%;background:#1877f2; }
  .day-dot-yest  { width:8px;height:8px;border-radius:50%;background:#aaa; }
  .kpi-row { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 12px; }
  .kpi { background: var(--surface2); border-radius: var(--radius-sm); padding: 10px 12px; }
  .kpi-label { font-size: 11px; color: var(--text3); margin-bottom: 4px; }
  .kpi-value { font-size: 18px; font-weight: 600; color: var(--text); }

  .section-title { font-size: 12px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; margin: 20px 0 10px; }

  .metrics-table { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-bottom: 20px; }
  .metrics-table table { width:100%;border-collapse:collapse;font-size:13px; }
  .metrics-table th { background:var(--surface2);padding:10px 14px;text-align:left;font-weight:500;color:var(--text2);font-size:12px;border-bottom:0.5px solid var(--border); }
  .metrics-table td { padding:9px 14px;border-bottom:0.5px solid var(--border);color:var(--text);vertical-align:middle; }
  .metrics-table tr:last-child td { border-bottom:none; }
  .metrics-table tr:hover td { background:var(--surface2); }
  .change-badge { display:inline-block;padding:2px 7px;border-radius:20px;font-size:11px;font-weight:500; }
  .up  { background:var(--green-bg);color:var(--green); }
  .down{ background:var(--red-bg);color:var(--red); }
  .neu { background:var(--surface2);color:var(--text3); }

  .creative-controls { display: flex; flex-wrap: wrap; align-items: center; gap: 10px; margin-bottom: 12px; }
  .controls-group { display: flex; align-items: center; gap: 6px; }
  .controls-label { font-size: 11px; font-weight: 600; color: var(--text3); letter-spacing: 0.04em; white-space: nowrap; }
  .controls-divider { width: 1px; height: 20px; background: var(--border2); margin: 0 4px; }

  .period-btn { padding: 5px 14px; font-size: 12px; font-weight: 500; border: 0.5px solid var(--border2); border-radius: 20px; cursor: pointer; background: transparent; color: var(--text2); transition: all 0.15s; white-space: nowrap; }
  .period-btn.active { background:#1877f2;color:#fff;border-color:#1877f2; }
  .period-btn:hover:not(.active) { background:var(--surface2); }

  .filter-btn { padding: 5px 13px; font-size: 12px; font-weight: 500; border: 0.5px solid var(--border2); border-radius: 20px; cursor: pointer; background: transparent; color: var(--text2); transition: all 0.15s; white-space: nowrap; }
  .filter-btn:hover:not(.active) { background: var(--surface2); }
  .filter-btn.active.kol-active { background: #6a1b9a; color: #fff; border-color: #6a1b9a; }
  .filter-btn.active.non-kol-active { background: #e65100; color: #fff; border-color: #e65100; }
  .filter-btn.active.all-active { background: #1877f2; color: #fff; border-color: #1877f2; }

  .kol-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: #6a1b9a; margin-right: 5px; vertical-align: middle; flex-shrink: 0; }

  .period-loading { padding:16px;text-align:center;color:var(--text2);font-size:13px; }

  .creative-table { width:100%;border-collapse:collapse;font-size:12px;background:var(--surface);border:0.5px solid var(--border);overflow:hidden; }
  .creative-table th { background:var(--surface2);padding:8px 12px;text-align:left;font-weight:500;color:var(--text3);font-size:11px;border-bottom:0.5px solid var(--border);white-space:nowrap; }
  .creative-table td { padding:8px 12px;border-bottom:0.5px solid var(--border);vertical-align:middle; }
  .creative-table tr:last-child td { border-bottom:none; }
  .creative-table tr:hover td { background:var(--surface2); }
  .ad-name { font-weight:500;color:var(--text);max-width:220px;word-break:break-all;line-height:1.4; }

  .sortable-th { cursor: pointer; user-select: none; transition: color 0.12s; }
  .sortable-th:hover { color: #1877f2; }
  .sortable-th.sort-active { color: #1877f2; }
  .sort-icon { margin-left: 3px; font-size: 10px; opacity: 0.5; }
  .sortable-th.sort-active .sort-icon { opacity: 1; }

  .kol-row td:first-child { border-left: 3px solid #6a1b9a; }
  .kol-tag { display:inline-block; padding:1px 6px; border-radius:4px; background:#f3e5f5; color:#6a1b9a; font-size:10px; font-weight:700; margin-left:4px; vertical-align:middle; }

  .rec-badge { display:inline-block;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap; }
  .rec-kill  { background:#ffebee;color:#c62828; }
  .rec-recut { background:#fff3e0;color:#e65100; }
  .rec-keep  { background:#e8f5e9;color:#2e7d32; }
  .rec-boost { background:#e3f2fd;color:#1565c0; }
  .rec-watch { background:var(--surface2);color:var(--text2); }
  .spend-bar-wrap { width:60px;height:6px;background:var(--surface2);border-radius:3px;display:inline-block;vertical-align:middle; }
  .spend-bar { height:6px;border-radius:3px;background:#1877f2; }

  /* ── 素材強度 badge ── */
  .tier-badge { display:inline-flex; align-items:center; justify-content:center; width:32px; height:22px; border-radius:6px; font-size:11px; font-weight:800; letter-spacing:0.02em; white-space:nowrap; }
  .tier-T0 { background:#1a237e; color:#fff; }
  .tier-T1 { background:#1565c0; color:#fff; }
  .tier-T2 { background:#e65100; color:#fff; }
  .tier-T3 { background:var(--surface2); color:var(--text2); border: 0.5px solid var(--border2); }
  .tier-loading { background:var(--surface2); color:var(--text3); font-size:10px; }

  /* ── KOL 受眾測試區塊 ── */
  .kol-audience-box { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-bottom: 20px; }
  .kol-audience-header { background: linear-gradient(135deg,#4a148c 0%,#7b1fa2 100%); padding: 12px 18px; display: flex; align-items: center; justify-content: space-between; }
  .kol-audience-header h3 { color: #fff; font-size: 14px; font-weight: 700; }
  .kol-audience-header span { color: rgba(255,255,255,0.75); font-size: 12px; }
  .kol-audience-body { padding: 16px 18px; }
  .kol-person-block { margin-bottom: 18px; padding-bottom: 18px; border-bottom: 0.5px solid var(--border); }
  .kol-person-block:last-child { margin-bottom:0; padding-bottom:0; border-bottom:none; }
  .kol-person-name { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .kol-person-name strong { font-size: 14px; color: #6a1b9a; }
  .kol-person-meta { font-size: 12px; color: var(--text3); }
  .kol-audience-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
  .kol-audience-chip { background: #f3e5f5; border: 0.5px solid #ce93d8; border-radius: 20px; padding: 4px 12px; font-size: 12px; color: #4a148c; display: flex; align-items: center; gap: 5px; }
  .kol-audience-chip .chip-spend { font-size: 11px; color: #7b1fa2; font-weight: 600; }
  .kol-total-row { display: flex; gap: 16px; flex-wrap: wrap; margin-top: 8px; }
  .kol-total-item { background: var(--surface2); border-radius: 8px; padding: 6px 14px; font-size: 12px; }
  .kol-total-item span { color: var(--text3); margin-right: 4px; }
  .kol-total-item strong { color: var(--text); }

  /* ── KOL 素材小計區塊 ── */
  .kol-summary-box { background: var(--surface); border: 0.5px solid #ce93d8; border-radius: var(--radius); overflow: hidden; margin-bottom: 20px; }
  .kol-summary-header { background: linear-gradient(135deg,#4a148c 0%,#7b1fa2 100%); padding: 10px 16px; }
  .kol-summary-header h3 { color: #fff; font-size: 13px; font-weight: 700; }
  .kol-summary-body { padding: 14px 16px; }
  .kol-summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); gap: 10px; }
  .kol-summary-kpi { background: #f3e5f5; border-radius: 8px; padding: 10px 14px; }
  .kol-summary-kpi-label { font-size: 11px; color: #7b1fa2; margin-bottom: 4px; }
  .kol-summary-kpi-value { font-size: 17px; font-weight: 700; color: #4a148c; }
  .kol-summary-table { width:100%; border-collapse:collapse; font-size:12px; margin-top:12px; }
  .kol-summary-table th { background:#f3e5f5; padding:7px 12px; text-align:left; font-weight:600; color:#6a1b9a; font-size:11px; border-bottom:0.5px solid #ce93d8; }
  .kol-summary-table td { padding:7px 12px; border-bottom:0.5px solid var(--border); color:var(--text); vertical-align:middle; }
  .kol-summary-table tr:last-child td { border-bottom:none; }
  .kol-summary-table tr:hover td { background:#fce4ec; }

  .footer { text-align:center;padding:20px;font-size:12px;color:var(--text3); }

  @media (max-width:600px) {
    .day-compare { grid-template-columns:1fr; }
    .kpi-row { grid-template-columns:repeat(2,1fr); }
    .top-bar h1 { font-size:15px; }
    .kpi-chips { gap:6px; }
    .kpi-chip { min-width:70px;padding:6px 10px; }
    .creative-controls { gap: 6px; }
  }
</style>

<body>

<div class="top-bar">
  <h1>📊 META 廣告數據儀表板｜丰丹 × 花現喜福</h1>
  <div style="display:flex;gap:10px;align-items:center;">
    <span class="date-badge" id="todayBadge">載入中...</span>
    <button class="refresh-btn" onclick="loadAllData()">↻ 重新整理</button>
  </div>
</div>

<div class="container">
  <div class="client-tabs">
    <button class="client-tab active" onclick="switchClient(0)">丰丹嚴選本舖</button>
    <button class="client-tab" onclick="switchClient(1)">花現喜福</button>
  </div>
  <div class="client-panel active" id="panel-0">
    <div class="status-bar"><div class="status-dot loading" id="status-dot-0"></div><span id="status-text-0">資料載入中...</span></div>
    <div id="error-0"></div>
    <div id="content-0"></div>
  </div>
  <div class="client-panel" id="panel-1">
    <div class="status-bar"><div class="status-dot loading" id="status-dot-1"></div><span id="status-text-1">資料載入中...</span></div>
    <div id="error-1"></div>
    <div id="content-1"></div>
  </div>
</div>

<div class="footer">資料來源：META Marketing API｜每次重新整理抓取最新數據</div>

<script>
const TOKEN = 'EAAUPmHiPNZCsBRokNCDohk5rgjRMKvrIDwk3yhLAZCIhrpYk67ms1D6Jos92H5x2G4jVBJhnIQzeZC0KKDcg4CI19vSjDdjrw1uaDCjUFZCtl0tJmPzTJLyzECm4rfQmfmhSCCHVTQduWSScNRP65ypHEeWYvjDmKUrWIjVogvsncZCSaNh1gjLV1AZAeGeAZDZD';

const CLIENTS = [
  {
    name: '丰丹嚴選本舖',
    accounts: ['8977185638960433'],
    cpa: { good: 850, ok: 1200 }
  },
  {
    name: '花現喜福',
    accounts: ['1203680740493775'],
    cpa: { good: 800, ok: 1000 }
  }
];

function saveGoal(ci,field,val){try{localStorage.setItem('goal_fd_'+ci+'_'+field,val);}catch(e){}}
function loadGoal(ci,field){try{return parseFloat(localStorage.getItem('goal_fd_'+ci+'_'+field)||0);}catch(e){return 0;}}

const FIELDS = 'spend,impressions,clicks,ctr,reach,frequency,actions,action_values,cost_per_action_type,video_p25_watched_actions,video_p50_watched_actions,video_p100_watched_actions,video_play_actions,outbound_clicks';
const AD_FIELDS = 'ad_name,adset_name,campaign_name,spend,impressions,clicks,ctr,actions,action_values,cost_per_action_type,outbound_clicks,video_play_actions,video_p25_watched_actions,video_p95_watched_actions';

function getDateRange() {
  const now = new Date();
  const fmt = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  const yest = new Date(now); yest.setDate(yest.getDate()-1);
  const dayB = new Date(now); dayB.setDate(dayB.getDate()-2);
  return { today:fmt(yest), yesterday:fmt(dayB) };
}
function getExtendedDateRange(days) {
  const now = new Date();
  const fmt = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  const end = new Date(now); end.setDate(end.getDate()-1);
  const start = new Date(now); start.setDate(start.getDate()-days);
  return { since:fmt(start), until:fmt(end) };
}

const gv  = (d,k) => { if(!d?.actions) return 0; const a=d.actions.find(x=>x.action_type===k); return a?parseFloat(a.value):0; };
const gcpa= (d,k) => { if(!d?.cost_per_action_type) return 0; const a=d.cost_per_action_type.find(x=>x.action_type===k); return a?parseFloat(a.value):0; };
const gacv= (d,k) => { if(!d?.action_values) return 0; const a=d.action_values.find(x=>x.action_type===k); return a?parseFloat(a.value):0; };
const gvid= (d,f) => { if(!d?.[f]) return 0; return d[f].reduce((s,x)=>s+parseFloat(x.value||0),0); };
const gob = (d)   => { if(!d?.outbound_clicks) return 0; return d.outbound_clicks.reduce((s,x)=>s+parseFloat(x.value||0),0); };
const adv = (ad,k)=> gv(ad,k);
const adcpa=(ad,k)=> gcpa(ad,k);
const adacv=(ad,k)=> gacv(ad,k);
const adob = (ad) => gob(ad);

function mergeInsights(arr) {
  if (!arr||arr.length===0) return null;
  const res = {};
  for (const k of ['spend','impressions','clicks','reach']) res[k]=arr.reduce((s,d)=>s+parseFloat(d[k]||0),0);
  res.ctr = res.impressions>0?res.clicks/res.impressions*100:0;
  const ma = (field) => {
    const c={};
    for (const d of arr) if(d[field]) for(const a of d[field]) c[a.action_type]=(c[a.action_type]||0)+parseFloat(a.value||0);
    return Object.entries(c).map(([action_type,value])=>({action_type,value:String(value)}));
  };
  res.actions=ma('actions'); res.action_values=ma('action_values');
  res.cost_per_action_type=[];
  for (const a of res.actions) { const v=parseFloat(a.value); if(v>0&&res.spend>0) res.cost_per_action_type.push({action_type:a.action_type,value:String((res.spend/v).toFixed(2))}); }
  for (const vf of ['video_p25_watched_actions','video_p50_watched_actions','video_p100_watched_actions','video_play_actions']) {
    const c={};
    for(const d of arr) if(d[vf]) for(const a of d[vf]) c[a.action_type||'v']=(c[a.action_type||'v']||0)+parseFloat(a.value||0);
    res[vf]=Object.entries(c).map(([action_type,value])=>({action_type,value:String(value)}));
  }
  const oc={};
  for(const d of arr) if(d.outbound_clicks) for(const a of d.outbound_clicks) oc[a.action_type||'l']=(oc[a.action_type||'l']||0)+parseFloat(a.value||0);
  res.outbound_clicks=Object.entries(oc).map(([action_type,value])=>({action_type,value:String(value)}));
  return res;
}

function normName(name) { if(!name) return '未命名'; return name.replace(/(\s*-\s*複本)+\s*$/g,'').trim(); }

// ── 廣告類型分類邏輯 ──
// 丰丹：行銷活動命名「轉換｜興趣」「轉換｜KOL」「轉換｜RT」「轉換｜ASC」「轉換｜類似」「互動｜RT」
// 花現喜福：「TW - 轉換 - 興趣」「TW - 轉換 - KOL」「TW - 轉換 - RT」「TW - 轉換 - ASC」「TW - 轉換 - 類似」
function classType(camp, ci) {
  const t = (camp || '').toUpperCase();
  if (t.includes('素材')) return '__SKIP__';
  if (
    (t.includes('互動') && !t.includes('轉換')) ||
    t.includes('流量') ||
    t.includes('觀看')
  ) return '流量/互動/觀看';
  if (t.includes('ASC')) return 'ASC';
  if (t.includes('KOL')) return 'KOL';
  if (t.includes('類似')) return '類似';
  if (t.includes('RT'))   return 'RT';
  if (t.includes('興趣')) return '興趣';
  return '其他';
}

function isKolType(type, adName) {
  if (type === 'KOL') return true;
  if (adName && adName.toUpperCase().includes('KOL')) return true;
  return false;
}

/* ══════════════════════════════════════════════
   素材強度（Tier）計算
   判斷條件（兩者同時滿足）：
   T0: 開啟 adset ≥ 50 且 帳戶月花費 ≥ 100,000
   T1: 開啟 adset ≥ 20 且 帳戶月花費 ≥ 50,000
   T2: 開啟 adset ≥ 10 且 帳戶月花費 <  50,000
   T3: 開啟 adset <  10 且 帳戶月花費 <  50,000

   activeAdsetMap: Map<normAdName, count> — 該素材對應的開啟 adset 數
   monthSpend: 帳戶本月總花費（數字）
══════════════════════════════════════════════ */
function calcCreativeTier(adName, activeAdsetMap, monthSpend) {
  const count = activeAdsetMap.get(normName(adName)) || 0;
  const ms = monthSpend || 0;

  if (count >= 50 && ms >= 100000) return 'T0';
  if (count >= 20 && ms >= 50000)  return 'T1';
  if (count >= 10 && ms < 50000)   return 'T2';
  return 'T3';
}

function tierBadgeHtml(tier) {
  return `<span class="tier-badge tier-${tier}">${tier}</span>`;
}

   只計 effective_status = ACTIVE（學習）或 LEARNING_LIMITED（學習效果有限）

/* ══════════════════════════════════════════════
   拉 Active Adset 列表
   effective_status=ACTIVE 涵蓋「學習中」「學習效果有限」「正常投遞」
   排除 RT、ASC、素材、流量/互動/觀看
   回傳 Map<normAdName, count>
══════════════════════════════════════════════ */
async function fetchActiveAdsetMap(accountId) {
  // 只拉 adset 清單（一次 API），不再用 batch 拉 ads
  // 回傳 Set<adsetName>（開啟中、符合類型的 adset 名稱集合）
  // 之後在 buildActiveAdsetMapFromInsights 用 adsToday 的 adset_name 交叉比對
  const adsetFields = 'id,name,effective_status,campaign{name}';
  let adsets = [];
  let url = `https://graph.facebook.com/v19.0/act_${accountId}/adsets?fields=${adsetFields}&effective_status=["ACTIVE"]&limit=200&access_token=${TOKEN}`;
  let pg = 0;
  while (url && pg < 10) {
    url = url.replace(/graph\.facebook\.com\/v\d+\.\d+\//, 'graph.facebook.com/v19.0/');
    const res = await fetch(url); const data = await res.json();
    if (data.error) { console.warn(`[Tier] err act_${accountId}:`, data.error.message); return new Set(); }
    if (data.data) adsets = adsets.concat(data.data);
    url = data.paging?.next || null; pg++;
  }

  // 過濾 campaign 類型，回傳有效 adset 的名稱 Set
  const validAdsetNames = new Set();
  for (const adset of adsets) {
    const campName = (adset.campaign?.name || '').toUpperCase();
    if (campName.includes('素材')) continue;
    if (campName.includes('ASC')) continue;
    if (campName.includes('RT')) continue;
    if (campName.includes('互動') || campName.includes('流量') || campName.includes('觀看')) continue;
    validAdsetNames.add(adset.name.trim());
  }
  console.log(`[Tier] act_${accountId} active adsets=${adsets.length} valid=${validAdsetNames.size}`);
  return validAdsetNames;
}

// 用 adsToday insights + activeAdsetNames 交叉計算素材強度
// activeAdsetNames: Set<adsetName>（開啟中的 adset 名稱）
function buildActiveAdsetMapFromInsights(adsToday, ci, activeAdsetNames) {
  const adNameToAdsetSet = new Map();
  for (const ad of adsToday) {
    if (parseFloat(ad.spend || 0) <= 0) continue;
    const type = classType(ad.campaign_name, ci);
    if (type === '__SKIP__') continue;
    const campName = (ad.campaign_name || '').toUpperCase();
    if (campName.includes('RT')) continue;
    if (campName.includes('ASC')) continue;
    const adsetKey = (ad.adset_name || '').trim();
    if (!adsetKey) continue;
    // 只計入目前開啟中的 adset
    if (activeAdsetNames && activeAdsetNames.size > 0 && !activeAdsetNames.has(adsetKey)) continue;
    const key = normName(ad.ad_name);
    if (!adNameToAdsetSet.has(key)) adNameToAdsetSet.set(key, new Set());
    adNameToAdsetSet.get(key).add(adsetKey);
  }
  const result = new Map();
  for (const [name, set] of adNameToAdsetSet) result.set(name, set.size);
  return result;
}

/* ══════════════════════════════════════════════
   KOL 受眾測試分析
══════════════════════════════════════════════ */
// ── KOL 受眾測試解析（支援丰丹｜格式及花現喜福 - 格式）──
function parseKolAdset(adsetName, ci) {
  const name = (adsetName || '').trim();
  if (name.toUpperCase().includes('RT')) return null;

  let parts = [];
  if (ci === 0) {
    // 丰丹：以「｜」分隔
    parts = name.split(/\s*[｜|]\s*/);
  } else {
    // 花現喜福：以「 - 」分隔
    parts = name.split(/\s*-\s*/);
  }

  if (parts.length < 3) return null;
  if (!parts[0].includes('興趣')) return null;

  let kolPartIdx = -1;
  for (let i = 1; i < parts.length; i++) {
    if (parts[i].toUpperCase().includes('KOL')) { kolPartIdx = i; break; }
  }
  if (kolPartIdx === -1) return null;

  const audience = parts.slice(1, kolPartIdx).join(ci === 0 ? '｜' : ' - ').trim();
  if (!audience) return null;

  const kolRaw = parts[kolPartIdx].trim();
  const kolName = kolRaw.replace(/^.*?KOL\s*/i, '').trim();
  if (!kolName) return null;

  return { audience, kolName };
}

function buildKolAudienceStats(rawAds) {
  const adsetSpend = {};
  for (const ad of rawAds) {
    const spend = parseFloat(ad.spend || 0);
    if (spend <= 0) continue;
    const key = (ad.adset_name || '').trim();
    if (!key) continue;
    adsetSpend[key] = (adsetSpend[key] || 0) + spend;
  }
  const kolMap = {};
  for (const [adsetName, spend] of Object.entries(adsetSpend)) {
    if (spend < 100) continue;
    const parsed = parseKolAdset(adsetName);
    if (!parsed) continue;
    const { audience, kolName } = parsed;
    if (!kolMap[kolName]) kolMap[kolName] = { audiences: {}, totalSpend: 0, adsetSet: new Set() };
    if (!kolMap[kolName].audiences[audience]) kolMap[kolName].audiences[audience] = 0;
    kolMap[kolName].audiences[audience] += spend;
    kolMap[kolName].totalSpend += spend;
    kolMap[kolName].adsetSet.add(adsetName);
  }
  return kolMap;
}

function buildKolAudienceBlock(ci, rawAds) {
  const kolMap = buildKolAudienceStats(rawAds, ci);
  const kolNames = Object.keys(kolMap).sort();

  if (kolNames.length === 0) {
    return `<div class="kol-audience-body">
      <div style="color:var(--text3);font-size:13px;padding:8px 0">近30天內無符合條件的KOL興趣測試組合（需花費 > NT$100）</div>
    </div>`;
  }

  let body = '';
  for (const kolName of kolNames) {
    const data = kolMap[kolName];
    const audienceList = Object.entries(data.audiences).sort((a,b) => b[1] - a[1]);
    const uniqueAudienceCount = audienceList.length;
    const kolTotalSpend = data.totalSpend;
    const kolAdsetCount = data.adsetSet.size;
    const chips = audienceList.map(([aud, spend]) =>
      `<div class="kol-audience-chip">${aud}<span class="chip-spend">NT$${Math.round(spend).toLocaleString()}</span></div>`
    ).join('');
    body += `
      <div class="kol-person-block">
        <div class="kol-person-name">
          <span style="width:8px;height:8px;border-radius:50%;background:#6a1b9a;display:inline-block;flex-shrink:0"></span>
          <strong>${kolName}</strong>
          <span class="kol-person-meta">不重複受眾 <b style="color:#4a148c">${uniqueAudienceCount}</b> 組｜廣告組合 <b style="color:#4a148c">${kolAdsetCount}</b> 組｜花費 <b style="color:#4a148c">NT$${Math.round(kolTotalSpend).toLocaleString()}</b></span>
        </div>
        <div class="kol-audience-chips">${chips}</div>
      </div>`;
  }
  return `<div class="kol-audience-body">${body}</div>`;
}

/* ══════════════════════════════════════════════
   KOL 素材小計區塊
══════════════════════════════════════════════ */
function buildKolSummaryBlock(ci, rawAds) {
  const kolAds = rawAds.filter(ad => {
    if (parseFloat(ad.spend || 0) <= 0) return false;
    const type = classType(ad.campaign_name, ci);
    return isKolType(type, ad.ad_name);
  });

  if (kolAds.length === 0) {
    return `<div class="kol-summary-body"><div style="color:var(--text3);font-size:13px">昨天無KOL廣告花費</div></div>`;
  }

  const merged = mergeAdsByName(kolAds, ci);
  let totalSpend = 0, totalPurchase = 0, totalAcv = 0, totalCart = 0, totalImpressions = 0, totalClicks = 0;
  for (const ad of merged) {
    totalSpend += parseFloat(ad.spend || 0);
    totalPurchase += adv(ad, 'purchase');
    totalAcv += adacv(ad, 'purchase');
    totalCart += adv(ad, 'add_to_cart');
    totalImpressions += parseInt(ad.impressions || 0);
    totalClicks += parseInt(ad.clicks || 0);
  }
  const totalCpa = totalPurchase > 0 ? totalSpend / totalPurchase : 0;
  const totalRoas = totalSpend > 0 ? totalAcv / totalSpend : 0;
  const totalCtr = totalImpressions > 0 ? totalClicks / totalImpressions * 100 : 0;

  const fM = n => n > 0 ? 'NT$' + Math.round(n).toLocaleString() : '-';
  const fX = n => n > 0 ? n.toFixed(2) + 'x' : '-';
  const rc = r => r >= 3 ? 'var(--green)' : r >= 2 ? 'var(--amber)' : r > 0 ? 'var(--red)' : '#4a148c';
  const cpaCl = (cpa) => { const t = CLIENTS[ci].cpa; return cpa <= 0 ? '#4a148c' : cpa < t.good ? 'var(--green)' : cpa < t.ok ? 'var(--amber)' : 'var(--red)'; };

  const sortedAds = [...merged].sort((a, b) => parseFloat(b.spend || 0) - parseFloat(a.spend || 0));
  const rows = sortedAds.map(ad => {
    const sp = parseFloat(ad.spend || 0);
    const pur = adv(ad, 'purchase');
    const cpa = adcpa(ad, 'purchase');
    const roas = sp > 0 ? adacv(ad, 'purchase') / sp : 0;
    const dispName = (ad.ad_name || '').length > 35 ? (ad.ad_name || '').slice(0, 35) + '…' : (ad.ad_name || '未命名');
    return `<tr>
      <td style="padding:7px 12px"><div style="font-size:12px;font-weight:500;color:var(--text)">${dispName}</div></td>
      <td style="padding:7px 12px;text-align:right">NT$${Math.round(sp).toLocaleString()}</td>
      <td style="padding:7px 12px;text-align:right">${pur > 0 ? pur : '-'}</td>
      <td style="padding:7px 12px;text-align:right;font-weight:700"><span style="color:${cpaCl(cpa)}">${fM(cpa)}</span></td>
      <td style="padding:7px 12px;text-align:right;font-weight:600"><span style="color:${rc(roas)}">${fX(roas)}</span></td>
    </tr>`;
  }).join('');

  return `
    <div class="kol-summary-body">
      <div class="kol-summary-grid">
        <div class="kol-summary-kpi"><div class="kol-summary-kpi-label">KOL 總花費</div><div class="kol-summary-kpi-value" style="font-size:15px">NT$${Math.round(totalSpend).toLocaleString()}</div></div>
        <div class="kol-summary-kpi"><div class="kol-summary-kpi-label">購買單數</div><div class="kol-summary-kpi-value">${totalPurchase > 0 ? totalPurchase : '-'}</div></div>
        <div class="kol-summary-kpi"><div class="kol-summary-kpi-label">CPA</div><div class="kol-summary-kpi-value" style="font-size:15px;color:${cpaCl(totalCpa)}">${fM(totalCpa)}</div></div>
        <div class="kol-summary-kpi"><div class="kol-summary-kpi-label">ROAS</div><div class="kol-summary-kpi-value" style="color:${rc(totalRoas)}">${fX(totalRoas)}</div></div>
        <div class="kol-summary-kpi"><div class="kol-summary-kpi-label">加購次數</div><div class="kol-summary-kpi-value">${totalCart > 0 ? totalCart : '-'}</div></div>
        <div class="kol-summary-kpi"><div class="kol-summary-kpi-label">CTR</div><div class="kol-summary-kpi-value">${totalCtr > 0 ? totalCtr.toFixed(2) + '%' : '-'}</div></div>
        <div class="kol-summary-kpi"><div class="kol-summary-kpi-label">素材數（去重）</div><div class="kol-summary-kpi-value">${merged.length}</div></div>
      </div>
      <div style="margin-top:14px">
        <table class="kol-summary-table">
          <thead><tr>
            <th>KOL 素材名稱</th>
            <th style="text-align:right">花費</th>
            <th style="text-align:right">購買</th>
            <th style="text-align:right">CPA</th>
            <th style="text-align:right">ROAS</th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>`;
}

function recommendAd(ad, ci) {
  const spend=parseFloat(ad.spend||0), cpa=adcpa(ad,'purchase'), roas=spend>0?adacv(ad,'purchase')/spend:0;
  const purchase=adv(ad,'purchase'), cart=adv(ad,'add_to_cart'), ctr=parseFloat(ad.ctr||0);
  const thr=CLIENTS[ci].cpa;

  if(spend<300) return {badge:'rec-watch',label:'觀察中',reason:`花費 NT$${Math.round(spend)}，資料不足`};

  if(purchase===0){
    if(spend>=1000&&cart===0) return {badge:'rec-kill',label:'立即暫停',reason:`花費 NT$${Math.round(spend)} 零購買零加購`};
    if(cart>0) return {badge:'rec-recut',label:'優化落地頁',reason:`有 ${cart} 次加購但零購買，建議優化結帳流程`};
    return {badge:'rec-watch',label:'觀察中',reason:`花費 NT$${Math.round(spend)} 尚無購買，繼續觀察`};
  }

  if(cpa<thr.good){
    if(purchase>=10||roas>=4) return {badge:'rec-boost',label:'加大預算',reason:`CPA NT$${Math.round(cpa)}（優秀✅）購買 ${purchase} 筆 ROAS ${roas.toFixed(2)}x，明星素材建議加 20-30% 預算`};
    if(purchase>=5)           return {badge:'rec-boost',label:'加大預算',reason:`CPA NT$${Math.round(cpa)}（優秀✅）購買 ${purchase} 筆，建議加大預算放量`};
    return {badge:'rec-keep',label:'持續投放',reason:`CPA NT$${Math.round(cpa)}（優秀✅）購買 ${purchase} 筆，維持現有預算`};
  }
  if(cpa<thr.ok){
    if(purchase>=8&&roas>=3) return {badge:'rec-keep',label:'持續投放',reason:`CPA NT$${Math.round(cpa)}（普通）購買 ${purchase} 筆 ROAS ${roas.toFixed(2)}x，整體表現不錯`};
    if(roas>=3)              return {badge:'rec-keep',label:'持續投放',reason:`CPA NT$${Math.round(cpa)}（普通）ROAS ${roas.toFixed(2)}x 達標，維持預算觀察`};
    return {badge:'rec-watch',label:'持續觀察',reason:`CPA NT$${Math.round(cpa)}（普通）購買 ${purchase} 筆，建議再觀察 2-3 天`};
  }
  if(purchase>=15&&roas>=3) return {badge:'rec-watch',label:'持續觀察',reason:`CPA NT$${Math.round(cpa)}（偏高）但購買量大（${purchase}筆）且 ROAS ${roas.toFixed(2)}x，縮預算繼續觀察`};
  if(roas<1.5)              return {badge:'rec-kill',label:'重新剪輯',reason:`CPA NT$${Math.round(cpa)}（差⚠️）ROAS ${roas.toFixed(2)}x 低於盈虧點，建議重新製作素材`};
  return {badge:'rec-recut',label:'調整素材',reason:`CPA NT$${Math.round(cpa)}（差⚠️）購買 ${purchase} 筆，建議調整素材訴求`};
}

async function fetchInsights(accountId, s, e) {
  const url=`https://graph.facebook.com/v19.0/act_${accountId}/insights?fields=${FIELDS}&time_range={"since":"${s}","until":"${e}"}&level=account&access_token=${TOKEN}`;
  const res=await fetch(url); const data=await res.json();
  if(data.error) throw new Error(data.error.message);
  return data.data?.length>0?data.data[0]:null;
}
async function fetchAdInsights(accountId, s, e) {
  const end=e||s; let all=[];
  let url=`https://graph.facebook.com/v19.0/act_${accountId}/insights?fields=${AD_FIELDS}&time_range={"since":"${s}","until":"${end}"}&level=ad&limit=200&access_token=${TOKEN}`;
  let pg=0;
  while(url&&pg<20){
    const res=await fetch(url); const data=await res.json();
    if(data.error) throw new Error(data.error.message+'(code:'+data.error.code+')');
    if(data.data) all=all.concat(data.data);
    url=data.paging?.next||null; pg++;
  }
  return all;
}

async function fetchAdsetInsights(accountId, s, e) {
  const end = e || s; let all = [];
  const fields = 'adset_name,campaign_name,spend,actions,action_values,cost_per_action_type';
  let url = `https://graph.facebook.com/v19.0/act_${accountId}/insights?fields=${fields}&time_range={"since":"${s}","until":"${end}"}&level=adset&limit=200&access_token=${TOKEN}`;

  }
  return all;
}

async function fetchClientData(ci) {
  const client=CLIENTS[ci]; const{today,yesterday}=getDateRange();
  const now=new Date(); const m1=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-01`;
  const res={today:[],yesterday:[],adsToday:[],adsYesterday:[],monthTotal:[],adsPrev:[],ads30d:[]};
  const r30=getExtendedDateRange(30);
  const r15a=getExtendedDateRange(15);
  const r15b={since:getExtendedDateRange(30).since, until:getExtendedDateRange(16).since};

  // 拉各帳號開啟中的 adset 名稱集合（只需一次 API，不用 batch）
  const mergedActiveAdsetNames = new Set();
  for (const acc of client.accounts) {
    const names = await fetchActiveAdsetMap(acc).catch(() => new Set());
    for (const n of names) mergedActiveAdsetNames.add(n);
  }

  for(const acc of client.accounts){
    const[t,y,at,ay,mo,ap,a30a,a30b]=await Promise.all([
      fetchInsights(acc,today,today).catch(()=>null),
      fetchInsights(acc,yesterday,yesterday).catch(()=>null),
      fetchAdInsights(acc,today).catch(()=>[]),
      fetchAdInsights(acc,yesterday).catch(()=>[]),
      fetchInsights(acc,m1,today).catch(()=>null),
      fetchAdInsights(acc,yesterday).catch(()=>[]),
      fetchAdInsights(acc,r15a.since,r15a.until).catch(e=>{console.warn('ads30d[0] err',e.message);return[];}),
      fetchAdInsights(acc,r15b.since,r15b.until).catch(e=>{console.warn('ads30d[1] err',e.message);return[];})
    ]);
    if(t)res.today.push(t); if(y)res.yesterday.push(y); if(mo)res.monthTotal.push(mo);
    res.adsToday=res.adsToday.concat(at||[]);
    res.adsYesterday=res.adsYesterday.concat(ay||[]);
    res.adsPrev=res.adsPrev.concat(ap||[]);
    res.ads30d=res.ads30d.concat(a30a||[]).concat(a30b||[]);
  }
  const uniqAdsets=(ads)=>new Set(
    ads.filter(a=>{
      if(parseFloat(a.spend||0)<=0) return false;
      const camp=(a.campaign_name||'').toUpperCase();
      if(camp.includes('ASC')) return false;
      if(camp.includes('RT')) return false;
      return true;
    }).map(a=>(a.adset_name||'').trim())
    .filter(n=>n.length>0)
  ).size;
  return{
    today:mergeInsights(res.today), yesterday:mergeInsights(res.yesterday),
    adsToday:res.adsToday, adsYesterday:res.adsYesterday,
    monthTotal:mergeInsights(res.monthTotal),
    adsetCountToday:uniqAdsets(res.adsToday),
    adsetCountYesterday:uniqAdsets(res.adsPrev),
    ads30d:res.ads30d,
    activeAdsetNames: mergedActiveAdsetNames
  };
}

function fmt(n,type='num'){
  if(n===null||n===undefined||isNaN(n))return'-';
  if(type==='money')return'NT$'+Math.round(n).toLocaleString();
  if(type==='pct')return n.toFixed(2)+'%';
  if(type==='x')return n.toFixed(2)+'x';
  return Math.round(n).toLocaleString();
}

function mergeAdsByName(rawAds, ci) {
  const map={};
  for(const ad of rawAds){
    if(parseFloat(ad.spend||0)<=0) continue;
    const type=classType(ad.campaign_name,ci);
    if(type==='__SKIP__') continue;
    const key=normName(ad.ad_name);
    if(!map[key]){
      map[key]=JSON.parse(JSON.stringify(ad));
      map[key].ad_name=key; map[key]._campaign=ad.campaign_name; map[key]._type=type;
    } else {
      const base=map[key];
      base.spend=String(parseFloat(base.spend||0)+parseFloat(ad.spend||0));
      base.impressions=String(parseInt(base.impressions||0)+parseInt(ad.impressions||0));
      base.clicks=String(parseInt(base.clicks||0)+parseInt(ad.clicks||0));
      const mArr=(f)=>{
        if(!ad[f])return; if(!base[f]){base[f]=JSON.parse(JSON.stringify(ad[f]));return;}
        for(const item of ad[f]){const ex=base[f].find(x=>x.action_type===item.action_type);if(ex)ex.value=String(parseFloat(ex.value||0)+parseFloat(item.value||0));else base[f].push(JSON.parse(JSON.stringify(item)));}
      };
      mArr('actions');mArr('action_values');mArr('outbound_clicks');
      mArr('video_play_actions');
      mArr('video_p25_watched_actions');
      mArr('video_p95_watched_actions');
      const imp=parseInt(base.impressions||0),clk=parseInt(base.clicks||0);
      base.ctr=imp>0?String((clk/imp*100).toFixed(4)):'0';
      const sp=parseFloat(base.spend||0); base.cost_per_action_type=[];
      if(base.actions)for(const a of base.actions){const v=parseFloat(a.value||0);if(v>0&&sp>0)base.cost_per_action_type.push({action_type:a.action_type,value:String((sp/v).toFixed(2))});}
    }
  }
  return Object.values(map);
}

function sumType(rawAds, type, ci){
  let s=0,p=0,a=0,c=0;
  for(const ad of rawAds){
    if(parseFloat(ad.spend||0)<=0)continue;
    if(classType(ad.campaign_name,ci)!==type)continue;
    s+=parseFloat(ad.spend||0); p+=adv(ad,'purchase'); a+=adacv(ad,'purchase'); c+=adv(ad,'add_to_cart');
  }
  return{spend:s,purchase:p,acv:a,cart:c,cpa:p>0?s/p:0,roas:s>0?a/s:0};
}

function buildAIPrompt(ci, todayData, adsToday, extra) {
  const client = CLIENTS[ci];
  const thr = client.cpa;
  const { today } = getDateRange();

  const spend = parseFloat(todayData?.spend || 0);
  const purchase = gv(todayData, 'purchase');
  const cpa = gcpa(todayData, 'purchase');
  const acv = gacv(todayData, 'purchase');
  const roas = spend > 0 ? acv / spend : 0;
  const ctr = parseFloat(todayData?.ctr || 0);
  const clicks = parseFloat(todayData?.clicks || 0);
  const convRate = clicks > 0 ? purchase / clicks * 100 : 0;

  const mo = extra.monthTotal || null;
  const moPurchase = mo ? Math.round(gv(mo, 'purchase')) : 0;
  const moAcv = mo ? gacv(mo, 'purchase') : 0;
  const goalOrders = loadGoal(ci, 'orders');
  const nowDate = new Date();
  const dayOfMonth = nowDate.getDate() - 1;
  const daysInMonth = new Date(nowDate.getFullYear(), nowDate.getMonth() + 1, 0).getDate();
  const daysLeft = daysInMonth - dayOfMonth;
  const needOrders = goalOrders > 0 ? Math.max(0, goalOrders - moPurchase) : 0;
  const achRate = goalOrders > 0 ? (moPurchase / goalOrders * 100) : 0;
  const dailyAvg = dayOfMonth > 0 ? moPurchase / dayOfMonth : 0;

  const typeOrder = ['流量/互動/觀看','ASC','KOL','興趣','類似','RT','其他'];

  const typeStats = {};
  for (const t of typeOrder) {
    const s = sumType(adsToday, t, ci);
    if (s.spend > 0) typeStats[t] = s;
  }

  const adsetByType = {};
  for (const ad of adsToday) {
    if (parseFloat(ad.spend || 0) <= 0) continue;
    const type = classType(ad.campaign_name, ci);
    if (type === '__SKIP__') continue;
    if (!adsetByType[type]) adsetByType[type] = [];
    adsetByType[type].push({
      name: (ad.adset_name || ad.ad_name || '').trim(),
      ad_name: normName(ad.ad_name),
      spend: parseFloat(ad.spend || 0),
      purchase: adv(ad, 'purchase'),
      cpa: adcpa(ad, 'purchase'),
      roas: parseFloat(ad.spend||0)>0 ? adacv(ad,'purchase')/parseFloat(ad.spend||0) : 0
    });
  }

  const ads14d = extra.ads30d || [];
  const map14 = {};
  for (const ad of ads14d) {
    if (parseFloat(ad.spend || 0) <= 0) continue;
    const type = classType(ad.campaign_name, ci);
    if (type === '__SKIP__') continue;
    const key = normName(ad.ad_name);
    if (!map14[key]) {
      map14[key] = JSON.parse(JSON.stringify(ad));
      map14[key].ad_name = key;
    } else {
      const base = map14[key];
      base.spend = String(parseFloat(base.spend || 0) + parseFloat(ad.spend || 0));
      const mArr = (f) => {
        if (!ad[f]) return; if (!base[f]) { base[f] = JSON.parse(JSON.stringify(ad[f])); return; }
        for (const item of ad[f]) { const ex = base[f].find(x => x.action_type === item.action_type); if (ex) ex.value = String(parseFloat(ex.value || 0) + parseFloat(item.value || 0)); else base[f].push(JSON.parse(JSON.stringify(item))); }
      };
      mArr('actions'); mArr('action_values');
      const sp = parseFloat(base.spend || 0); base.cost_per_action_type = [];
      if (base.actions) for (const a of base.actions) { const v = parseFloat(a.value || 0); if (v > 0 && sp > 0) base.cost_per_action_type.push({ action_type: a.action_type, value: String((sp / v).toFixed(2)) }); }
    }
  }
  const top14 = Object.values(map14)
    .filter(ad => adv(ad, 'purchase') >= 3 && parseFloat(ad.spend || 0) >= 500)
    .map(ad => ({
      name: ad.ad_name,
      spend: parseFloat(ad.spend || 0),
      purchase: adv(ad, 'purchase'),
      cpa: adcpa(ad, 'purchase'),
      roas: parseFloat(ad.spend||0)>0 ? adacv(ad,'purchase')/parseFloat(ad.spend||0) : 0
    }))
    .sort((a, b) => b.spend - a.spend)
    .slice(0, 6);

  const typeSummary = Object.entries(typeStats).map(([t, s]) => {
    const allAds = (adsetByType[t] || []).sort((a,b) => b.spend - a.spend);
    const topSpendAd = allAds[0];
    const topPurchaseAd = [...allAds].sort((a,b) => b.purchase - a.purchase)[0];
    const zeroBadAds = allAds.filter(a => a.purchase === 0 && a.spend >= 200);
    const hasOrderAds = allAds.filter(a => a.purchase > 0).sort((a,b) => b.purchase - a.purchase);

    let detail = `【${t}】總花費NT$${Math.round(s.spend)}，購買${s.purchase}單，整體CPA${s.cpa>0?'NT$'+Math.round(s.cpa):'無'}，ROAS${s.roas>0?s.roas.toFixed(2)+'x':'無'}`;
    if (topSpendAd) detail += `\n  → 花費最多：${topSpendAd.name}（NT$${Math.round(topSpendAd.spend)}，${topSpendAd.purchase}單${topSpendAd.cpa>0?'，CPA NT$'+Math.round(topSpendAd.cpa):'，零購買'}）`;
    if (topPurchaseAd && topPurchaseAd.purchase > 0 && topPurchaseAd.name !== topSpendAd?.name) detail += `\n  → 帶單最多：${topPurchaseAd.name}（花費NT$${Math.round(topPurchaseAd.spend)}，${topPurchaseAd.purchase}單，CPA NT$${Math.round(topPurchaseAd.cpa)}）`;

    return detail;
  }).join('\n');

  const top14Str = top14.length > 0 ? top14.map(a=>`${a.name}（花費NT$${Math.round(a.spend)}，${a.purchase}單，CPA NT$${Math.round(a.cpa)}，ROAS ${a.roas.toFixed(2)}x）`).join('\n') : '無';

  return `你是一位資深的 Meta 廣告操作師，每天早上要向客戶報告昨天的廣告表現。
請用「口語化、像在跟老闆面對面說話」的方式寫一份廣告日報，直接說重點，不要用條列式。

## 客戶：${client.name}
## 日期：${today}
## CPA 標準：優秀 < NT$${thr.good}，可接受 < NT$${thr.ok}

---

## 昨天整體數據
- 廣告費：NT$${Math.round(spend).toLocaleString()}
- 購買：${purchase} 單
- 營業額：${acv > 0 ? 'NT$' + Math.round(acv).toLocaleString() : '無資料'}
- CPA：${cpa > 0 ? 'NT$' + Math.round(cpa) : '無'}
- ROAS：${roas > 0 ? roas.toFixed(2) + 'x' : '無'}
- CTR：${ctr.toFixed(2)}%
- 轉換率：${convRate.toFixed(2)}%

## 月累計
- 累計訂單：${moPurchase} 單
- 累計營業額：${moAcv > 0 ? 'NT$' + Math.round(moAcv).toLocaleString() : '無資料'}
${goalOrders > 0 ? `- 月目標：${goalOrders} 單，達成率 ${achRate.toFixed(0)}%，剩 ${daysLeft} 天，需再跑 ${needOrders} 單，日均約 ${dailyAvg.toFixed(0)} 單` : ''}

## 昨天各廣告類型分組表現
${typeSummary}

## 近14天最佳素材（花費≥NT$500 且購買≥3單）
${top14Str}

---

## 口述稿寫作要求
1. 語氣自然：像在跟老闆面對面講話
2. 每個類型都要點出具體數字
3. 解釋原因：CPA偏高要說是哪幾組零購買拉高的
4. 判斷力：花費少說「樣本不夠，繼續觀察」；表現好的說建議加預算
5. 結構：整體概況 → 月目標進度 → 各類型逐一分析 → 近14天素材亮點 → 今天行動建議
6. 長度：400-600字
7. 直接給口述稿內容，不要用 markdown 格式，不要用 ** 粗體

請開始寫：`;
}

const PROXY_URL = 'https://anthropic-proxy.fatry53968.workers.dev';

async function generateAIReport(ci, todayData, adsToday, extra) {
  const containerId = `ai-report-text-${ci}`;
  const statusId = `ai-report-status-${ci}`;
  const el = document.getElementById(containerId);
  const statusEl = document.getElementById(statusId);
  if (!el) return;

  if (statusEl) { statusEl.innerHTML = `<div class="ai-spinner"></div><span>AI 正在分析數據，產生口述稿中...</span>`; statusEl.style.display = 'flex'; }
  el.textContent = '';

  const prompt = buildAIPrompt(ci, todayData, adsToday, extra);

  try {
    const response = await fetch(PROXY_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt })
    });

    if (!response.ok) {
      const errText = await response.text().catch(() => '');
      let errMsg = `HTTP ${response.status}`;
      try { const j = JSON.parse(errText); errMsg = j.error?.message || (typeof j.error === 'string' ? j.error : errMsg); } catch(e) { if(errText) errMsg = errText.slice(0,200); }
      throw new Error(errMsg);
    }

    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '', fullText = '', started = false;

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop() || '';
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const data = line.slice(6).trim();
        if (!data || data === '[DONE]') continue;
        try {
          const parsed = JSON.parse(data);
          if (parsed.error) throw new Error(parsed.error.message || JSON.stringify(parsed.error));
          const chunk = parsed.choices?.[0]?.delta?.content || '';
          if (chunk) {
            fullText += chunk;
            if (!started) { started = true; if (statusEl) statusEl.style.display = 'none'; }
            el.textContent = fullText;
          }
        } catch (e) {
          if (e.message && (e.message.startsWith('HTTP') || e.message.includes('API_KEY') || e.message.includes('quota'))) throw e;
        }
      }
    }

    _aiReportCache[ci] = fullText;
    if (statusEl) statusEl.style.display = 'none';
    el.insertAdjacentHTML('afterend', `<div style="margin-top:10px"><button class="ai-regen-btn" onclick="regenAIReport(${ci})">↻ 重新生成</button></div>`);
  } catch (err) {
    if (statusEl) statusEl.style.display = 'none';
    el.innerHTML = `<div class="ai-error-msg">⚠️ AI 生成失敗：${err.message}<br><br><button class="ai-regen-btn" onclick="regenAIReport(${ci})" style="margin-top:4px">↻ 重試</button></div>`;
  }
}

const _uiState = {};
function getUiState(ci) {
  if (!_uiState[ci]) _uiState[ci] = { period: '1d', filterKol: 'all', sortBy: 'spend', sortDir: 'desc' };
  return _uiState[ci];
}
const _periodCache = {};

async function loadDetailPeriod(ci, period) {
  getUiState(ci).period = period;
  _syncPeriodButtons(ci, period);
  if (_periodCache[ci + '_' + period]) { renderFlatTable(ci, _periodCache[ci + '_' + period]); return; }
  const el = document.getElementById('creative-' + ci);
  el.innerHTML = `<div class="period-loading">⏳ 載入數據中...</div>`;
  try {
    let since, until;
    if (period === '7d') { const r = getExtendedDateRange(7); since = r.since; until = r.until; }
    else if (period === '14d') { const r = getExtendedDateRange(14); since = r.since; until = r.until; }
    else if (period === '30d') { const r = getExtendedDateRange(30); since = r.since; until = r.until; }
    else { const { today } = getDateRange(); since = today; until = today; }
    let all = [];
    for (const acc of CLIENTS[ci].accounts) { const ads = await fetchAdInsights(acc, since, until); all = all.concat(ads); }
    _periodCache[ci + '_' + period] = all;
    renderFlatTable(ci, all);
  } catch (e) { el.innerHTML = `<div class="period-loading" style="color:var(--red)">⚠️ 載入失敗：${e.message}</div>`; }
}

function _syncPeriodButtons(ci, period) {
  document.querySelectorAll(`.period-btn[data-client="${ci}"]`).forEach(b => { b.classList.toggle('active', b.dataset.period === period); });
}

function setKolFilter(ci, val) {
  getUiState(ci).filterKol = val;
  const period = getUiState(ci).period;
  if (_periodCache[ci + '_' + period]) renderFlatTable(ci, _periodCache[ci + '_' + period]);
  document.querySelectorAll(`.filter-btn[data-client="${ci}"]`).forEach(b => {
    b.classList.remove('active', 'kol-active', 'non-kol-active', 'all-active');
    if (b.dataset.filter === val) { b.classList.add('active'); if (val === 'kol') b.classList.add('kol-active'); else if (val === 'non-kol') b.classList.add('non-kol-active'); else b.classList.add('all-active'); }
  });
}

function setSort(ci, field) {
  const s = getUiState(ci);
  if (s.sortBy === field) { s.sortDir = s.sortDir === 'desc' ? 'asc' : 'desc'; }
  else { s.sortBy = field; s.sortDir = field === 'cpa' ? 'asc' : 'desc'; }
  const period = s.period;
  if (_periodCache[ci + '_' + period]) renderFlatTable(ci, _periodCache[ci + '_' + period]);
}

function sortIcon(ci, field) {
  const s = getUiState(ci);
  if (s.sortBy !== field) return '<span class="sort-icon">⇅</span>';
  return `<span class="sort-icon">${s.sortDir === 'asc' ? '▲' : '▼'}</span>`;
}

/* ★ 核心修改：renderFlatTable 加入素材強度欄 */
function renderFlatTable(ci, rawAds) {
  const el = document.getElementById('creative-' + ci);
  const s = getUiState(ci);
  const { period, filterKol, sortBy, sortDir } = s;
  const { today: d1 } = getDateRange();

  // 取得帳戶月花費（從 cache）
  const cachedData = _reportCache[ci];
  const monthSpend = cachedData?.extra?.monthTotal ? parseFloat(cachedData.extra.monthTotal.spend || 0) : 0;
  // 用 ads30d insights 計算素材強度（不需額外 API）
  const activeAdsetNames = cachedData?.extra?.activeAdsetNames || new Set();
  const activeAdsetMap = buildActiveAdsetMapFromInsights(
    cachedData?.adsToday || [], ci, activeAdsetNames
  );

  let classifiedAds = mergeAdsByName(rawAds, ci)
    .map(ad => ({ ...ad, _type: classType(ad._campaign || ad.campaign_name, ci) }))
    .filter(ad => ad._type !== '__SKIP__');

  if (filterKol === 'kol') classifiedAds = classifiedAds.filter(ad => isKolType(ad._type, ad.ad_name));
  if (filterKol === 'non-kol') classifiedAds = classifiedAds.filter(ad => !isKolType(ad._type, ad.ad_name));

  const sortFn = (a, b) => {
    let va, vb;
    if (sortBy === 'spend') { va = parseFloat(a.spend || 0); vb = parseFloat(b.spend || 0); }
    else if (sortBy === 'cpa') { va = adcpa(a, 'purchase'); vb = adcpa(b, 'purchase'); if (va === 0) va = 9999999; if (vb === 0) vb = 9999999; }
    else if (sortBy === 'purchase') { va = adv(a, 'purchase'); vb = adv(b, 'purchase'); }
    else { va = parseFloat(a.spend || 0); vb = parseFloat(b.spend || 0); }
    return sortDir === 'asc' ? va - vb : vb - va;
  };
  classifiedAds.sort(sortFn);

  if (classifiedAds.length === 0) { el.innerHTML = '<div class="period-loading" style="color:var(--text3)">此期間無廣告花費</div>'; return; }

  const globalMax = Math.max(...classifiedAds.map(a => parseFloat(a.spend || 0)), 1);
  let periodLabel = period === '7d' ? `近7天（${getExtendedDateRange(7).since} ～ ${getExtendedDateRange(7).until}）`
    : period === '14d' ? `近14天（${getExtendedDateRange(14).since} ～ ${getExtendedDateRange(14).until}）`
    : period === '30d' ? `近30天（${getExtendedDateRange(30).since} ～ ${getExtendedDateRange(30).until}）`
    : `昨天（${d1}）`;

  const filterLabel = filterKol === 'kol' ? '🌟 KOL 素材' : filterKol === 'non-kol' ? '非 KOL 素材' : '全部素材';
  const thCls = (field) => `sortable-th${s.sortBy === field ? ' sort-active' : ''}`;

  // 素材強度圖例
  const tierLegend = `
    <span style="font-size:11px;color:var(--text3);margin-left:8px">素材強度：</span>
    <span class="tier-badge tier-T0" style="font-size:10px;width:auto;padding:1px 6px">T0</span><span style="font-size:10px;color:var(--text3);margin-right:4px"> ≥50組+月10萬</span>
    <span class="tier-badge tier-T1" style="font-size:10px;width:auto;padding:1px 6px">T1</span><span style="font-size:10px;color:var(--text3);margin-right:4px"> ≥20組+月5萬</span>
    <span class="tier-badge tier-T2" style="font-size:10px;width:auto;padding:1px 6px">T2</span><span style="font-size:10px;color:var(--text3);margin-right:4px"> ≥10組+月&lt;5萬</span>
    <span class="tier-badge tier-T3" style="font-size:10px;width:auto;padding:1px 6px">T3</span><span style="font-size:10px;color:var(--text3)"> 其餘</span>`;

  let rows = '';
  for (const ad of classifiedAds) {
    const isKol = isKolType(ad._type, ad.ad_name);
    const spend = parseFloat(ad.spend || 0);
    const impressions = parseFloat(ad.impressions || 0);
    const outboundClicks = adob(ad);
    const linkCtr = impressions > 0 ? outboundClicks / impressions * 100 : 0;
    const purchase = adv(ad, 'purchase');
    const cpa = adcpa(ad, 'purchase'), roas = spend > 0 ? adacv(ad, 'purchase') / spend : 0;
    const cartCpa = adcpa(ad, 'add_to_cart');
    const checkoutCpa = adcpa(ad, 'initiate_checkout');
    const vPlay = gvid(ad, 'video_play_actions');
    const vP25  = gvid(ad, 'video_p25_watched_actions');
    const vP95  = gvid(ad, 'video_p95_watched_actions');
    const vRetention = (vP25 > 0 && vP95 > 0) ? (vP95 / vP25 * 10) : null;
    const rec = recommendAd(ad, ci);
    const barW = Math.round(spend / globalMax * 60);
    const dispName = (ad.ad_name || '').length > 38 ? (ad.ad_name || '').slice(0, 38) + '…' : (ad.ad_name || '未命名');
    const kolTag = isKol ? '<span class="kol-tag">KOL</span>' : '';
    const rowClass = isKol ? 'class="kol-row"' : '';
    const retColor = vRetention !== null ? (vRetention >= 5 ? 'var(--green)' : vRetention >= 3 ? 'var(--amber)' : 'var(--red)') : 'var(--text3)';

    // ★ 計算素材強度
    const tier = calcCreativeTier(ad.ad_name, activeAdsetMap, monthSpend);
    const activeCount = activeAdsetMap.get(normName(ad.ad_name)) || 0;
    const tierHtml = `<div style="display:flex;flex-direction:column;align-items:center;gap:2px">
      ${tierBadgeHtml(tier)}
      <span style="font-size:9px;color:var(--text3);white-space:nowrap">${activeCount}組</span>
    </div>`;

    rows += `<tr ${rowClass}>
      <td style="padding:8px 10px;text-align:center;white-space:nowrap">${tierHtml}</td>
      <td style="padding:8px 12px">
        <div style="display:flex;align-items:flex-start;gap:4px">
          ${isKol ? '<span class="kol-dot" style="margin-top:5px"></span>' : ''}
          <div><div class="ad-name" title="${(ad.ad_name || '').replace(/</g, '&lt;')}">${dispName}${kolTag}</div></div>
        </div>
      </td>
      <td style="padding:8px 12px;text-align:right">NT$${Math.round(spend).toLocaleString()}<br><div class="spend-bar-wrap"><div class="spend-bar" style="width:${barW}px"></div></div></td>
      <td style="padding:8px 12px;text-align:right">${linkCtr > 0 ? linkCtr.toFixed(2) + '%' : '-'}</td>
      <td style="padding:8px 12px;text-align:right;color:var(--text2)">${cartCpa > 0 ? fM(cartCpa) : '-'}</td>
      <td style="padding:8px 12px;text-align:right;color:var(--text2)">${checkoutCpa > 0 ? fM(checkoutCpa) : '-'}</td>
      <td style="padding:8px 12px;text-align:right;font-weight:${s.sortBy === 'purchase' ? '700' : '400'}">${purchase > 0 ? purchase : '-'}</td>
      <td style="padding:8px 12px;text-align:right;font-weight:700"><span style="color:${cpaCl(cpa, ci)}">${fM(cpa)}</span></td>
      <td style="padding:8px 12px;text-align:right;font-weight:600;color:${rc(roas)}">${fX(roas)}</td>
      <td style="padding:8px 12px;text-align:right;color:var(--text2)">${vPlay > 0 ? Math.round(vPlay).toLocaleString() : '-'}</td>
      <td style="padding:8px 12px;text-align:right;color:var(--text2)">${vP25 > 0 ? Math.round(vP25).toLocaleString() : '-'}</td>
      <td style="padding:8px 12px;text-align:right;color:var(--text2)">${vP95 > 0 ? Math.round(vP95).toLocaleString() : '-'}</td>
      <td style="padding:8px 12px;text-align:right;font-weight:600;color:${retColor}">${vRetention !== null ? vRetention.toFixed(1) + '成' : '-'}</td>
      <td style="padding:8px 12px"><span class="rec-badge ${rec.badge}">${rec.label}</span></td>
    </tr>`;
  }

  el.innerHTML = `
    <div style="font-size:11px;color:var(--text3);margin-bottom:6px;display:flex;flex-wrap:wrap;align-items:center;gap:4px">
      <span>統計區間：${periodLabel}｜${filterLabel} 共 <b>${classifiedAds.length}</b> 組｜CPA 顏色：綠=優秀 橘=普通 紅=差｜25→95% 顏色：綠≥5成 橘≥3成 紅&lt;3成</span>
      ${tierLegend}
    </div>
    <div class="metrics-table">
      <table class="creative-table">
        <thead><tr>
          <th style="text-align:center;min-width:52px">強度</th>
          <th>廣告名稱</th>
          <th style="text-align:right" class="${thCls('spend')}" onclick="setSort(${ci},'spend')">花費 ${sortIcon(ci, 'spend')}</th>
          <th style="text-align:right">CTR(連結)</th>
          <th style="text-align:right">加到購物車成本</th>
          <th style="text-align:right">開始結帳成本</th>
          <th style="text-align:right" class="${thCls('purchase')}" onclick="setSort(${ci},'purchase')">購買 ${sortIcon(ci, 'purchase')}</th>
          <th style="text-align:right" class="${thCls('cpa')}" onclick="setSort(${ci},'cpa')">CPA ★ ${sortIcon(ci, 'cpa')}</th>
          <th style="text-align:right">ROAS</th>
          <th style="text-align:right">播放次數</th>
          <th style="text-align:right">播放25%</th>
          <th style="text-align:right">播放95%</th>
          <th style="text-align:right">25→95%</th>
          <th>建議</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
}

        <div class="kpi"><div class="kpi-label">CPA ★</div><div class="kpi-value" style="font-size:15px">${fmt(cy, 'money')}</div></div>
      </div>
      <div class="kpi-row">
        <div class="kpi"><div class="kpi-label">ROAS</div><div class="kpi-value">${fmt(ry, 'x')}</div></div>
        <div class="kpi"><div class="kpi-label">CTR</div><div class="kpi-value">${fmt(y?.ctr, 'pct')}</div></div>
      </div>
    </div>
  </div>`;
}

function renderClient(ci, todayData, yesterdayData, adsToday, adsYesterday, extra = {}) {
  const content = document.getElementById('content-' + ci);
  const { today, yesterday } = getDateRange();
  const r30 = getExtendedDateRange(30);

  content.innerHTML = `
    <div style="font-size:12px;color:var(--text3);margin-bottom:12px">昨天 ${today}（主）｜前天 ${yesterday}</div>

    <div class="daily-report-box">
      <div class="daily-report-header">
        <h2>📋 昨日廣告日報</h2>
        <button class="copy-btn" onclick="copyReport(${ci})">📋 複製口述稿</button>
      </div>
      <div class="daily-report-body" id="daily-report-${ci}">
        <div class="report-loading">⏳ 產生日報中...</div>
      </div>
    </div>

    <div class="section-title">廣告類型分組總覽</div>
    <div id="creative-summary-${ci}"></div>

    ${buildTopKPIs(todayData, yesterdayData)}

    <div class="section-title">詳細指標對比</div>
    ${buildMetricsTable(todayData, yesterdayData)}

    <div class="section-title" style="margin-top:24px">素材明細（依花費排序）</div>
    <div class="creative-controls">
      <div class="controls-group">
        <span class="controls-label">時間</span>
        <button class="period-btn active" data-client="${ci}" data-period="1d"  onclick="loadDetailPeriod(${ci},'1d')">昨天</button>
        <button class="period-btn"        data-client="${ci}" data-period="7d"  onclick="loadDetailPeriod(${ci},'7d')">近 7 天</button>
        <button class="period-btn"        data-client="${ci}" data-period="14d" onclick="loadDetailPeriod(${ci},'14d')">近 14 天</button>
        <button class="period-btn"        data-client="${ci}" data-period="30d" onclick="loadDetailPeriod(${ci},'30d')">近 30 天</button>
      </div>
      <div class="controls-divider"></div>
      <div class="controls-group">
        <span class="controls-label">篩選</span>
        <button class="filter-btn active all-active" data-client="${ci}" data-filter="all"     onclick="setKolFilter(${ci},'all')">全部</button>
        <button class="filter-btn"                   data-client="${ci}" data-filter="kol"     onclick="setKolFilter(${ci},'kol')">🌟 KOL</button>
        <button class="filter-btn"                   data-client="${ci}" data-filter="non-kol" onclick="setKolFilter(${ci},'non-kol')">非 KOL</button>
      </div>
    </div>
    <div id="creative-${ci}"><div class="period-loading">載入中...</div></div>

    <div class="section-title" style="margin-top:28px">🌟 KOL 受眾測試追蹤（近30天 ${r30.since} ～ ${r30.until}）</div>
    <div class="kol-audience-box">
      <div class="kol-audience-header">
        <h3>🌟 KOL 興趣受眾測試分析</h3>
        <span>花費 &gt; NT$100 才計入｜受眾去重｜排除 RT</span>
      </div>
      <div id="kol-audience-${ci}"><div class="report-loading">載入中...</div></div>
    </div>`;

  _reportCache[ci] = { todayData, adsToday, extra };

  if (todayData) {
    document.getElementById('daily-report-' + ci).innerHTML = buildDailyReport(ci, todayData, adsToday, extra);
    generateAIReport(ci, todayData, adsToday, extra);
  }

  document.getElementById('creative-summary-' + ci).innerHTML = buildCreativeSummary(ci, adsToday, adsYesterday);
  document.getElementById('kol-audience-' + ci).innerHTML = buildKolAudienceBlock(ci, extra.ads30d || []);

  _periodCache[ci + '_1d'] = adsToday;
  _uiState[ci] = { period: '1d', filterKol: 'all', sortBy: 'spend', sortDir: 'desc' };
  renderFlatTable(ci, adsToday);
}

async function loadClient(ci) {
  const dot = document.getElementById('status-dot-' + ci);
  const txt = document.getElementById('status-text-' + ci);
  const errEl = document.getElementById('error-' + ci);
  dot.className = 'status-dot loading'; txt.textContent = '資料載入中...'; errEl.innerHTML = '';
  try {
    const data = await fetchClientData(ci);
    dot.className = 'status-dot ok'; txt.textContent = '資料已更新';
    renderClient(ci, data.today, data.yesterday, data.adsToday || [], data.adsYesterday || [], {
      monthTotal: data.monthTotal,
      adsetCountToday: data.adsetCountToday,
      adsetCountYesterday: data.adsetCountYesterday,
      ads30d: data.ads30d || [],
      activeAdsetNames: data.activeAdsetNames || new Set(),

    });
  } catch (e) {
    dot.className = 'status-dot error'; txt.textContent = '資料載入失敗';
    errEl.innerHTML = `<div class="error-msg">⚠️ 無法取得資料：${e.message}</div>`;
  }
}

function loadAllData() {
  const { today: d1, yesterday: d2 } = getDateRange();
  document.getElementById('todayBadge').textContent = '昨 ' + d1 + ' / 前 ' + d2;
  loadClient(0); loadClient(1);
}

function switchClient(idx) {
  document.querySelectorAll('.client-tab').forEach((t, i) => t.classList.toggle('active', i === idx));
  document.querySelectorAll('.client-panel').forEach((p, i) => p.classList.toggle('active', i === idx));
}

loadAllData();
</script>
</body>
</html>
